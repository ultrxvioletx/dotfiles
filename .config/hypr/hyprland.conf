#hyprland.conf
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


################
### MONITORS ###
################

$hdmi = HDMI-A-1
monitor = eDP-1, 1920x1200@60, 1920x0, 1.33
monitor = $hdmi, 1920x1080@60, 0x0, 1

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = .config/rofi/launchers/type-7/launcher.sh #wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd --all # Exportar las variables de sesión a systemd para que los servicios de usuario funcionen
exec-once = awww-daemon &
exec-once = ~/.config/hypr/scripts/wallpaper.sh # change walllpaper
exec-once = udiskie --no-automount --tray  # --no-automount evita montajes redundantes
exec-once = hyprpanel
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Oxygen-Pink-Blossom'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = hyprctl setcursor Oxygen-Pink-Blossom 24
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh
exec-once = hypridle # apaga la pantalla por inactividad
exec-once = hyprsunset -t 4500 # reduce el brillo en la noche
exec-once = ~/.config/hypr/scripts/ags-watchdog.sh #reinicia AGS para limpiar el leak


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM, wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_THEME,Oxygen-Pink-Blossom
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Oxygen-Pink-Blossom
env = GDK_SCALE, 2

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

source=~/.config/hypr/general.conf


###################
### KEYBINDINGS ###
###################

source=~/.config/hypr/keybinds.conf


##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, monitor:eDP-1 #navegador
workspace = 2, monitor:$hdmi #vscode
workspace = 3, monitor:$hdmi #terminales

windowrule = suppress_event maximize, match:class .* # Ignore maximize requests from apps
windowrule = no_focus on,match:class ^$,match:title ^$,match:xwayland 1,match:float 1,match:fullscreen 0,match:pin 0 # Fix some dragging issues with XWayland
windowrule = opacity 0.1 override 0.1 override,match:class ^(rofi)$

# source=~/.config/hypr/windowrules.conf
